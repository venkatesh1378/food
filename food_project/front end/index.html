<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Online Food Delivery Feedback</h1>

        <div class="form-container">
            <div class="input-group">
                <label>Age:</label>
                <input type="number" id="age" required>
            </div>

            <div class="input-group">
                <label>Gender:</label>
                <select id="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>Marital Status:</label>
                <select id="marital_status">
                    <option value="single">Single</option>
                    <option value="married">Married</option>
                    <option value="prefer not to say">Prefer not to say</option>
                </select>
            </div>

            <div class="input-group">
                <label>Occupation:</label>
                <select id="occupation">
                    <option value="student">Student</option>
                    <option value="employee">Employee</option>
                    <option value="self employeed">Self Employed</option>
                    <option value="house wife">House Wife</option>
                </select>
            </div>

            <div class="input-group">
                <label>Monthly Income (₹):</label>
                <input type="number" id="monthly_income" required>
            </div>

            <div class="input-group">
                <label>Education:</label>
                <select id="education">
                    <option value="graduate">Graduate</option>
                    <option value="post graduate">Post Graduate</option>
                    <option value="ph.d">Ph.D</option>
                    <option value="school">School</option>
                    <option value="uneducated">Uneducated</option>
                </select>
            </div>

            <div class="input-group">
                <label>Family Size:</label>
                <input type="number" id="family_size" required>
            </div>



            <div class="input-group">
                <label>Ordered Again?</label>
                <select id="output">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <button onclick="predict()">Get Feedback Prediction</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        async function predict() {
            const data = {
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                marital_status: document.getElementById('marital_status').value,
                occupation: document.getElementById('occupation').value,
                monthly_income: document.getElementById('monthly_income').value,
                education: document.getElementById('education').value,
                family_size: document.getElementById('family_size').value,

                output: document.getElementById('output').value
            };

            const resultDiv = document.getElementById('result');

            try {
                const response = await fetch('https://food-delivery-cvq8.onrender.com/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const responseData = await response.json();

                if (responseData.error) {
                    resultDiv.style.color = 'red';
                    resultDiv.innerHTML = `Error: ${responseData.error}`;
                } else {
                    resultDiv.style.color = responseData.result === 'POSITIVE' ? 'green' : 'red';
                    resultDiv.innerHTML = `Predicted Feedback: ${responseData.result}`;
                }

            } catch (error) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = 'Failed to connect to server';
            }
        }
    </script>
</body>

</html>
